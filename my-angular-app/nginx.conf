server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header X-XSS-Protection      "1; mode=block"           always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── CORS (enable when a Java/Spring backend calls this app)
    # Uncomment and adjust when you add a backend API.
    #
    # add_header Access-Control-Allow-Origin  "http://localhost:8080" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # ── Angular SPA routing ───────────────────────────────────
    # All routes fall back to index.html so Angular's router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────
    # Angular adds a content-hash to bundle filenames at build time,
    # so it is safe to cache them aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API proxy (uncomment when you add a Java/Spring backend) ──
    # Requests to /api/... are forwarded to the backend container.
    # Use the Docker Compose service name ("backend") as the hostname.
    #
    # location /api/ {
    #     proxy_pass         http://backend:8080/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # ── Disable access to hidden files ────────────────────────
    location ~ /\. {
        deny all;
    }

    error_page 404 /index.html;
}
